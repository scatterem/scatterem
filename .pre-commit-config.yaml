exclude: "^(tests/|build/|dist/|\\.eggs/|\\.git/|\\.venv/|venv/|env/)"
repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix
