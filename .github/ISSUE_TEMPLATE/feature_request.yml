name: Feature request
description: Suggest a capability, example, tutorial, or public-release requirement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What need are you trying to address?
      description: Describe the workflow, research question, or integration need behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the desired behavior, documentation, or release artifact.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include dataset scale, hardware expectations, comparison methods, or reproducibility constraints if relevant.
