name: Bug report
description: Report a problem with the public repository scaffold, docs, CI, or packaging metadata.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. This repository is in a pre-release phase, so bug reports about the public scaffold are especially useful.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, links, or exact actions when possible.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, and any relevant tooling details.
      placeholder: Windows 11, Python 3.12, uv 0.x, GitHub Actions, CUDA 12.x
  - type: textarea
    id: impact
    attributes:
      label: Why this matters
      description: Explain whether this blocks understanding, contribution, installation, or trust in the project scaffold.
